<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Marked</title>
  <style>
    table {
      border-collapse: collapse;
      margin: 20px 0;
    }
    th, td {
      border: 1px solid #000;
      padding: 8px;
    }
    th {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <h1>Marked Table Test</h1>
  <div id="output"></div>
  
  <script src="node_modules/marked/lib/marked.umd.js"></script>
  <script>
    const markdown = `
| 列1 | 列2 | 列3 |
|-----|-----|-----|
| 值1 | 值2 | 值3 |
| 值4 | 值5 | 值6 |
`;
    
    console.log('Markdown input:', markdown);
    
    marked.use({ gfm: true });
    const html = marked.parse(markdown);
    
    console.log('HTML output:', html);
    
    document.getElementById('output').innerHTML = html;
  </script>
</body>
</html>
