# 项目1配置示例
server {
    listen 80;
    server_name project1.local www.project1.local;
    
    root /usr/share/nginx/html/project1;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

